name: LCD
version: 1
author: wormi

steps:
  - wait-serial: 'ec4th ok'
  - delay: 5ms
  - write-serial: " .S \r"
  - wait-serial: '<0>'
  - wait-serial: 'ok'
  - write-serial: " $27 lcd-init s\" Hola Mundo\" $27 lcd-type \r"
  - wait-serial: 'ok'
  - take-screenshot:
      part-id: 'lcd1'
      save-to: '../../output/test/lcd.1.png'
      compare-with: './lcd.1.png'
