name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CI container
        run: docker compose build

      - name: Start workspace
        run: docker compose up -d

      - name: Build artifacts
        run: |
          docker compose exec -T \
            workspace bash -lc 'cd /workspace && bash build.sh && make forth2012-report'

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts

          docker cp \
            "workspace:/workspace/output/ec4th-arduino-nano-regular.bin" \
            release-artifacts/
          docker cp \
            "workspace:/workspace/output/ec4th-arduino-nano-regular.elf" \
            release-artifacts/
          docker cp \
            "workspace:/workspace/output/ec4th-arduino-nano-regular.hex" \
            release-artifacts/
          docker cp \
            "workspace:/workspace/output/ec4th-arduino-nano-regular.sym" \
            release-artifacts/
          docker cp \
            "workspace:/workspace/doc/forth2012-core-wordset-coverage.md" \
            release-artifacts/

      - name: Publish wordset report summary
        run: |
          {
            echo
            cat release-artifacts/forth2012-core-wordset-coverage.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stage release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ec4th-build-${{ github.sha }}
          path: |
            release-artifacts/ec4th-arduino-nano-regular.bin
            release-artifacts/ec4th-arduino-nano-regular.elf
            release-artifacts/ec4th-arduino-nano-regular.hex
            release-artifacts/ec4th-arduino-nano-regular.sym
            release-artifacts/forth2012-core-wordset-coverage.md

      - name: Clean up
        if: ${{ always() }}
        run: docker compose down --volumes --remove-orphans

  simavr-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build CI container
        run: docker compose build

      - name: Start workspace
        run: docker compose up -d

      - name: Build firmware for smoke test
        run: |
          docker compose exec -T \
            workspace bash -lc 'cd /workspace && bash build.sh'

      - name: Run simavr smoke test
        run: |
          docker compose exec -T \
            workspace bash -lc 'cd /workspace && bash ci/smoke-test.sh'

      - name: Clean up
        if: ${{ always() }}
        run: docker compose down --volumes --remove-orphans

  wokwi-scenario:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build CI container
        run: docker compose build

      - name: Start workspace
        run: docker compose up -d

      - name: Build firmware for Wokwi
        run: |
          docker compose exec -T \
            workspace bash -lc 'cd /workspace && bash build.sh'

      - name: Run Wokwi scenario test
        run: |
          docker compose exec -T \
            -e WOKWI_CLI_TOKEN="${{ secrets.WOKWI_CLI_TOKEN }}" \
            workspace bash -lc 'cd /workspace && make wokwi-tests'

      - name: Collect test artifacts
        if: ${{ always() }}
        run: |
          mkdir -p output
          container_id="$(docker compose ps -q workspace)"
          rm -rf output/test
          docker cp \
            "workspace:/workspace/output/test" \
            output/test || true
          {
            echo
            if [[ -d output/test ]]; then
              find output/test -type f -name '*.log' \
                -print -exec sh -c 'cat "$1"; echo' _ {} \;
            fi
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ec4th-test-${{ github.sha }}
          path: output/test
          if-no-files-found: ignore

      - name: Clean up
        if: ${{ always() }}
        run: docker compose down --volumes --remove-orphans

  release:
    runs-on: ubuntu-latest
    needs:
      - build-artifacts
      - simavr-smoke
      - wokwi-scenario

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ec4th-build-${{ github.sha }}
          path: release-artifacts

      - name: Compute next patch tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n1)"

          if [[ -z "$latest_tag" ]]; then
            next_tag="v0.0.1"
          elif [[ "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          else
            echo "Latest tag '$latest_tag' is not semver vX.Y.Z" >&2
            exit 1
          fi

          echo "tag=$next_tag" >>"$GITHUB_OUTPUT"

      - name: Create and push release tag
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email \
            "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: |
            release-artifacts/ec4th-arduino-nano-regular.bin
            release-artifacts/ec4th-arduino-nano-regular.elf
            release-artifacts/ec4th-arduino-nano-regular.hex
            release-artifacts/ec4th-arduino-nano-regular.sym
            release-artifacts/forth2012-core-wordset-coverage.md
